# config file for reward generation from GPT*

defaults:
  - config
  - _self_

root_dir: ${oc.env:ROOT_PATH}

database:
  # folders
  rewards_dir: ${root_dir}/database/${evolution.baseline}/${data_paths.run}  # store path for rewards database
  # hyper params
  num_islands: 4  # number of groups/populations to start with
  max_island_size: 8  # max number of samples in each group
#  reset_period: 8  # reset the lowest performing group after period (iterations)
  crossover_prob: 0.5  # probability of preferring a crossover over mutation
  migration_prob: 0.3  # probability of resetting weaker islands with seeds migrated from other islands
  # sampling hyperparameters
  initial_temp: 1  # start with a higher temperature for uniform sampling (exploration)
  final_temp: 0.6  # exploitation
  num_gpus: 0  # 0 = all individuals train simultaneously; N = limit to N parallel

evolution:
  num_generations: 7  # number of iterations T
  baseline: revolve_auto  # revolve, revolve_auto, eureka, eureka_auto
  individuals_per_generation: 16  # number of individuals in each generation
  inherit_checkpoint: false  # gen 0 from scratch, gen 1+ fine-tune from parent SAC checkpoint

few_shot:
  mutation: 1  # few-shot prompting for mutation
  crossover: 2  # few-shot prompting for crossover

data_paths:
  log: True  # log metrics and stats
  run: 10
  output_logs: ${root_dir}/logs/${evolution.baseline}/${data_paths.run}

environment:
  name: "HumanoidEnv"  # Choose between "HumanoidEnv" or "AdroitHandDoorEnv"

wandb:
  enabled: True
  project: "revolve"
  entity: null
  run_name: null  # auto-generated if null

u2o:
  enabled: false  # set to true to use U2O pretraining
  pretrained_dir: ${root_dir}/u2o_pretrained
  # --- Architecture (must match pretrain) ---
  z_dim: 50              # skill vector dimension (reference: 50)
  hidden_dim: 1024       # network hidden size (reference: 1024)
  phi_hidden_dim: 512    # feature network hidden size (reference: 512)
  feature_dim: 512       # feature output dimension (reference: 512)
  feature_learner: hilp  # feature learning method (hilp, lap, contrastive, icm, etc.)
  feature_type: state    # phi input type: state | diff | concat
  # --- HILP ---
  hilp_discount: 0.98    # HILP temporal discount
  hilp_expectile: 0.5    # expectile for value learning (conservative: 0.7-0.9)
  # --- Optimizer ---
  lr: 1e-4               # learning rate
  lr_coef: 5.0           # phi optimizer lr multiplier (phi_lr = lr_coef * lr)
  # --- Training loop (finetune overrides) ---
  batch_size: 1024       # batch size
  finetune_steps: 500000 # fine-tuning steps per reward function (reference: 1M, SAC baseline: 300K)
  num_sf_updates: 1      # gradient updates per env step
  update_every_steps: 1  # update frequency
  update_z_every_step: 300   # skill resampling frequency
  update_cov_every_step: 1000  # covariance update frequency
  num_expl_steps: 0      # random exploration steps at start (0 = skip, weights already pretrained)
  # --- SF-specific ---
  sf_target_tau: 0.01    # soft update rate for target networks
  mix_ratio: 0.5         # fraction of batch using phi-derived skills
  q_loss: true           # use Q-loss (true) vs feature-loss (false)
  use_rew_norm: true     # normalize task rewards during fine-tuning
  # --- Actor ---
  stddev_schedule: "0.2" # action noise schedule
  stddev_clip: 0.3       # action noise clip
  boltzmann: false       # use entropy-regularized (Boltzmann) actor
  temp: 1.0              # temperature for Boltzmann actor
  # --- Replay buffer (pretrain values; loaded from pretrain_config at runtime) ---
  discount: 0.98         # MDP discount
  future: 0.99           # future sampling parameter
  p_randomgoal: 0.375    # random goal sampling probability

